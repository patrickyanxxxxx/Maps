name: ' iRingo: Maps Satellite Request Diagnostics v2'
description: |-
  只记录卫星与 3D 请求，不改写地图数据；自动隐藏 accessKey 等凭据。
  v2 修复 gspe11-2-cn-ssl 国内卫星端点未匹配的问题。
author: patrickyanxxxxx; Codex
homepage: https://github.com/patrickyanxxxxx/Maps
scriptings:
- http_request:
    name: Maps.SatelliteDiagnostics.v2.request
    match: ^https?:\/\/(?:gspe11(?:-2-cn)?|gspe19(?:-kittyhawk|-cn)?|gspe79(?:-cn)?|gspe76|gsp76-cn)-ssl\.ls\.apple\.(?:com|cn)\/
    script_url: https://raw.githubusercontent.com/patrickyanxxxxx/Maps/main/modules/archive/assets/diagnose.satellite-requests.v2.js
mitm:
  hostnames:
    includes:
    - gspe11-ssl.ls.apple.com
    - gspe11-2-cn-ssl.ls.apple.com
    - gspe19-ssl.ls.apple.com
    - gspe19-kittyhawk-ssl.ls.apple.com
    - gspe19-cn-ssl.ls.apple.com
    - gspe79-ssl.ls.apple.com
    - gspe79-cn-ssl.ls.apple.com
    - gspe76-ssl.ls.apple.com
    - gsp76-cn-ssl.ls.apple.com
