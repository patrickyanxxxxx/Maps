name: ' iRingo: Maps iOS 27 Selective Hybrid + Mainland 3D Native Local v4'
description: |-
  Egern 本地参数模块。中国大陆保留高德二维地图、道路、地点、导航与 2D 卫星，并使用带正确 CN 白名单的原生国内 3D selector；中国大陆以外全部使用 Apple 国际资源与服务。
  参考 Loon Hybrid Fix 的隔离思路，但继续使用本项目逻辑，并允许选择中国地点/导航服务范围。
  请勿与另一个 Selective Hybrid 模块同时启用。
compat_arguments:
  GeoManifest.Dynamic.Config.CountryCode: US
  UrlInfoSet.Dispatcher: AutoNavi
  UrlInfoSet.Directions: AutoNavi
  UrlInfoSet.RAP: Apple
  UrlInfoSet.LocationShift: AutoNavi
  TileSet.Earth: Apple
  TileSet.Flyover: XX
  TileSet.Munin: XX
  TileSet.Roads: XX
  TileSet.Satellite: XX
  Hybrid.MainlandLayers: EXTENDED
  Hybrid.ServiceMode: APPLE
  LogLevel: WARN
compat_arguments_desc: |
  推荐先使用默认值；CountryCode 必须保持 US 才能保留国际 3D 能力。

  Hybrid.MainlandLayers: [中国二维图层]
      ├ EXTENDED: 完整中国二维图层，含道路、标签、交通与 2D 卫星（默认）
      └ CORE: 仅标准地图、建筑、POI 与地标，用于诊断

  Hybrid.ServiceMode: [中国服务完整度]
      ├ APPLE: Apple 前台服务，仅保留大陆反向地理编码及可选坐标修正（默认，国外完全国际化）
      ├ CN_POI: 高德地点与反向地理编码，导航保留 Apple
      └ CN_FULL: 高德地点、反向地理编码、导航与交通（国内服务最完整，但国外 POI/导航不再严格国际化）

  国内卫星与 3D 原生选择:
      CN 2D/3D selector 使用协议规定的 countryCode/region 对象，并保留 CN 清单原始版本号和覆盖范围。
      不进行瓦片请求改写；国外由并存的国际 selector 回落。


  UrlInfoSet.LocationShift:
      ├ AutoNavi: 中国大陆使用 GCJ-02 修正（默认）
      └ Apple: 不注入高德坐标修正

  TileSet.Flyover / TileSet.Munin / TileSet.Roads / TileSet.Satellite:
      └ XX: 保持国际资源（默认；不建议在本模式中改为 CN）

  LogLevel: WARN / INFO / DEBUG
author: patrickyanxxxxx; VirgilClyne; Codex
homepage: https://github.com/patrickyanxxxxx/Maps
icon: https://developer.apple.com/assets/elements/icons/maps/maps-128x128.png
rules:
- domain:
    match: gspe12-cn-ssl.ls.apple.com
    policy: DIRECT
- domain:
    match: gspe19-cn-ssl.ls.apple.com
    policy: DIRECT
- domain:
    match: gspe19-2-cn-ssl.ls.apple.com
    policy: DIRECT
- domain:
    match: gspe79-cn-ssl.ls.apple.com
    policy: DIRECT
- domain:
    match: gspe11-2-cn-ssl.ls.apple.com
    policy: DIRECT
- domain_suffix:
    match: is.autonavi.com
    policy: DIRECT
scriptings:
- http_request:
    name: Maps.SelectiveHybridMainland3DNative.defaults.request
    match: ^https?:\/\/configuration\.ls\.apple\.com\/config\/defaults
    script_url: https://raw.githubusercontent.com/patrickyanxxxxx/Maps/main/modules/assets/request.selective-hybrid-mainland-3d-native.v4.bundle.js
    env:
      _compat.$argument: GeoManifest.Dynamic.Config.CountryCode="{{{GeoManifest.Dynamic.Config.CountryCode}}}"&UrlInfoSet.Dispatcher="{{{UrlInfoSet.Dispatcher}}}"&UrlInfoSet.Directions="{{{UrlInfoSet.Directions}}}"&UrlInfoSet.RAP="{{{UrlInfoSet.RAP}}}"&UrlInfoSet.LocationShift="{{{UrlInfoSet.LocationShift}}}"&TileSet.Earth="{{{TileSet.Earth}}}"&TileSet.Flyover="{{{TileSet.Flyover}}}"&TileSet.Munin="{{{TileSet.Munin}}}"&TileSet.Roads="{{{TileSet.Roads}}}"&TileSet.Satellite="{{{TileSet.Satellite}}}"&Hybrid.Enabled="true"&Hybrid.MainlandLayers="{{{Hybrid.MainlandLayers}}}"&Hybrid.Mainland3D="NATIVE"&Hybrid.ServiceMode="{{{Hybrid.ServiceMode}}}"&Storage="Argument"&LogLevel="{{{LogLevel}}}"
- http_response:
    name: Maps.SelectiveHybridMainland3DNative.defaults.response
    match: ^https?:\/\/configuration\.ls\.apple\.com\/config\/defaults
    script_url: https://raw.githubusercontent.com/patrickyanxxxxx/Maps/main/modules/assets/response.selective-hybrid-mainland-3d-native.v4.bundle.js
    env:
      _compat.$argument: GeoManifest.Dynamic.Config.CountryCode="{{{GeoManifest.Dynamic.Config.CountryCode}}}"&UrlInfoSet.Dispatcher="{{{UrlInfoSet.Dispatcher}}}"&UrlInfoSet.Directions="{{{UrlInfoSet.Directions}}}"&UrlInfoSet.RAP="{{{UrlInfoSet.RAP}}}"&UrlInfoSet.LocationShift="{{{UrlInfoSet.LocationShift}}}"&TileSet.Earth="{{{TileSet.Earth}}}"&TileSet.Flyover="{{{TileSet.Flyover}}}"&TileSet.Munin="{{{TileSet.Munin}}}"&TileSet.Roads="{{{TileSet.Roads}}}"&TileSet.Satellite="{{{TileSet.Satellite}}}"&Hybrid.Enabled="true"&Hybrid.MainlandLayers="{{{Hybrid.MainlandLayers}}}"&Hybrid.Mainland3D="NATIVE"&Hybrid.ServiceMode="{{{Hybrid.ServiceMode}}}"&Storage="Argument"&LogLevel="{{{LogLevel}}}"
    body_required: true
- http_request:
    name: Maps.SelectiveHybridMainland3DNative.announcements.request
    match: ^https?:\/\/gspe35-ssl\.ls\.apple\.(com|cn)\/config\/announcements
    script_url: https://raw.githubusercontent.com/patrickyanxxxxx/Maps/main/modules/assets/request.selective-hybrid-mainland-3d-native.v4.bundle.js
